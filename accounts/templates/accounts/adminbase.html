{% extends 'accounts/logging.html' %}


{% block content %}
<div class="container-fluid pf-0">
    <div class="row g-0" style="min-height: 85vh;">

        <nav class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse collapse-horizontal" id="sidebarMenu">
            <div class="position-sticky pt-3 h-100 d-flex flex-column justify-content-between">
                <ul class="nav flex-column mb-auto">
                    <li class="px-3 mb-3 text-uppercase text-white fw-bold small" style="letter-spacing: 1px;">
                        Admin Panel
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-light opacity-75 hover-opacity-100 mx-2 py-2 d-flex align-items-center"
                            href="{% url 'admin_dashboard' %}">
                            <i class="bi bi-ticket-perforated me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-light opacity-75 hover-opacity-100 mx-2 py-2 d-flex align-items-center"
                            href="{% url 'view_team_tickets' %}">
                            <i class="bi bi-ticket-perforated me-2"></i> Employee Issues
                        </a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-light opacity-75 hover-opacity-100 mx-2 py-2 d-flex align-items-center"
                            href="{% url 'register' %}">
                            <i class="bi bi-person-plus me-2"></i> Add Employee
                        </a>
                    </li>
                </ul>

                <div class="p-3 bg-danger bg-opacity-10 border-top border-secondary">
                    <div class="small fw-bold text-white">{{ request.user.employee_profile.name }}</div>
                    <div class="text-danger small fw-semibold" style="font-size: 0.75rem;">System Administrator</div>
                    <form action="{% url 'logout' %}" method="POST" class="d-inline w-100">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-outline-danger w-100 mt-2">Sign Out</button>
                    </form>
                </div>
            </div>
        </nav>

        {% block mainContent %}
        {% endblock %}

    </div>
</div>
{% endblock %}
