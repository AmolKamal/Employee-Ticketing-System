{% extends 'accounts/logging.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-10 col-md-3 col-lg-3">
        <div class="card shadow border-0">
            <div class="card-header bg-light text-center py-3">
                <h4 class="mb-0">Log In</h4>
            </div>
            <div class="card-body p-4">

                {% if form.errors %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <strong>Invalid credentials!</strong> Please check your username and password.
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endif %}

                <form method="POST" action ="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-bold">Username</label>
                        <input type="text" name="username" id="id_username" class="form-control"
                            placeholder="Enter username" required>
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-bold">Password</label>
                        <input type="password" name="password" id="id_password" class="form-control"
                            placeholder="Enter password" required>
                    </div>

                    <div class="d-grid gap-2 mb-3">
                        <button type="submit" class="btn btn-primary btn-lg">Login</button>
                    </div>
                </form>

                <!-- <div class="text-center mt-3">
                    <p class="text-muted small">New employee? <a href="{% url 'register' %}"
                            class="text-decoration-none">Register here</a></p>
                </div> -->

            </div>
        </div>
    </div>
</div>
{% endblock %}
