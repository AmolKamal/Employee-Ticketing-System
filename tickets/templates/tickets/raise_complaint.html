{% extends 'accounts/base.html' %}

{% block mainContent %}
<!-- <div class="container-fluid pf-0">
    <div class="row g-0" style="min-height: 85vh;">
         -->

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="row">
                <div class="col-xl-8">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4">
                            <form method="POST">
                                {% csrf_token %}
        
                                <div class="mb-3">
                                    <label class="form-label fw-bold text-secondary">Issue Title / Summary</label>
                                    {{ form.title }}
                                </div>
        
                                <div class="mb-3">
                                    <label class="form-label fw-bold text-secondary">Route To (Target Manager)</label>
                                    {{ form.assigned_manager }}
                                    <div class="form-text">Select the corporate authority who should review this file.</div>
                                </div>
        
                                <div class="mb-4">
                                    <label class="form-label fw-bold text-secondary">Detailed Description</label>
                                    {{ form.detailed_issue }}
                                </div>
        
                                <div class="d-flex gap-2 justify-content-end">
                                    <a href="{% url 'dashboard' %}" class="btn btn-light border">Cancel</a>
                                    <button type="submit" class="btn btn-danger px-4">Submit Complaint Ticket</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const userRole = "{{ request.user.employee_profile.role }}";
                const managerSelect = document.getElementById('id_assigned_manager');
                const originalOptions = Array.from(managerSelect.options);

                managerSelect.innerHTML = '';

                if (originalOptions[0] && originalOptions[0].value === '') {
                    managerSelect.appendChild(originalOptions[0]);
                }

                originalOptions.forEach(option => {
                    if (option.value === '') return; // Skip empty placeholder row

                    const text = option.text.toUpperCase();
                    let isTargetAdmin = text.includes('(ADMIN)');
                    let isTargetManager = text.includes('(MANAGER)');

                    if (userRole === 'MANAGER') {
                        if (isTargetAdmin) {
                            managerSelect.appendChild(option.cloneNode(true));
                        }
                    } else if (userRole === 'DEVELOPER') {
                        if (isTargetAdmin || isTargetManager) {
                            managerSelect.appendChild(option.cloneNode(true));
                        }
                    } else {
                        managerSelect.appendChild(option.cloneNode(true));
                    }
                });
            });
        </script>

    <!-- </div>
</div> -->
{% endblock %}
